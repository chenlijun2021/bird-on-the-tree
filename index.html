<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ama's Tree - High Precision Rendering</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            font-family: "Georgia", serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.5s;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 设置面板样式 */
        #settings-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
            width: 200px;
            transition: transform 0.3s ease, opacity 0.3s;
        }
        #settings-panel.collapsed {
            transform: translateX(230px);
            opacity: 0.5;
        }
        #settings-toggle {
            position: absolute;
            left: -40px;
            top: 0;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.05);
        }
        .setting-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-item label {
            font-size: 12px;
            color: #444;
        }
        .setting-item input {
            cursor: pointer;
            border: none;
            background: none;
            width: 30px;
            height: 30px;
        }

        #hint {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); font-size: 13px;
            letter-spacing: 2px; color: #b0aca0;
            pointer-events: none; font-style: italic;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="settings-panel">
        <div id="settings-toggle">⚙️</div>
        <div class="setting-item">
            <label>背景颜色</label>
            <input type="color" id="bgColor" value="#f7f6f0">
        </div>
        <div class="setting-item">
            <label>树枝颜色</label>
            <input type="color" id="branchColor" value="#2d2b28">
        </div>
        <div class="setting-item">
            <label>字符颜色</label>
            <input type="color" id="leafColor" value="#4a5d38">
        </div>
        <div class="setting-item">
            <label>文字颜色</label>
            <input type="color" id="textColor" value="#1a1917">
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <div id="hint">点击画布，让思念在诗行与枝头间飞翔</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const treeCanvas = document.createElement('canvas');
        const tctx = treeCanvas.getContext('2d');

        // UI 控件
        const settingsPanel = document.getElementById('settings-panel');
        const settingsToggle = document.getElementById('settings-toggle');
        const bgColorInput = document.getElementById('bgColor');
        const branchColorInput = document.getElementById('branchColor');
        const leafColorInput = document.getElementById('leafColor');
        const textColorInput = document.getElementById('textColor');

        let width, height, dpr;
        let particles = [];
        let currentMode = 'tree'; // 'tree' 或 'poem'
        let transitionStartTime = 0;
        let treeOpacity = 1.0;
        let branches = [];
        let leafPoints = [];

        // 颜色参数
        let colors = {
            bg: bgColorInput.value,
            branch: branchColorInput.value,
            leaf: leafColorInput.value,
            text: textColorInput.value
        };

        const poem = "To my dearest Ama,\n\nIn the quiet corners of my childhood, you were the steadfast tree that gave me shade. Your hands, weathered like ancient bark, held the softest touch, weaving tales of the old village into my dreams.\n\nI still remember the comforting scent of jasmine tea and the gentle hum of your lullabies filling the evening air. Time scatters our days like autumn leaves caught in the wind.\n\nBut your roots run deep within my soul, holding me firm when the storms come. Every gentle breeze carries the warmth of your smile, every scattered leaf a memory I hold dear.";

        // 事件监听：UI 交互
        settingsToggle.onclick = (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('collapsed');
        };
        bgColorInput.oninput = (e) => {
            colors.bg = e.target.value;
            document.body.style.backgroundColor = colors.bg;
        };
        branchColorInput.oninput = (e) => {
            colors.branch = e.target.value;
            drawTreeToBuffer();
        };
        leafColorInput.oninput = (e) => {
            colors.leaf = e.target.value;
            particles.forEach(p => p.color = colors.leaf);
        };
        textColorInput.oninput = (e) => {
            colors.text = e.target.value;
        };
        document.body.style.backgroundColor = colors.bg;

        function resize() {
            // 获取像素比，默认为 1，高分屏通常为 2 或 3
            dpr = window.devicePixelRatio || 1;
            
            // 逻辑尺寸
            width = window.innerWidth || 300;
            height = window.innerHeight || 300;

            // 设置 Canvas 绘图表面尺寸 (物理像素)
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            treeCanvas.width = width * dpr;
            treeCanvas.height = height * dpr;

            // 缩放上下文，确保后续绘图命令使用逻辑像素
            ctx.scale(dpr, dpr);
            tctx.scale(dpr, dpr);

            initScene();
        }

        function initScene() {
            particles = [];
            branches = [];
            leafPoints = [];

            function buildTree(x, y, len, angle, bWidth, depth) {
                let endX = x + len * Math.cos(angle);
                let endY = y + len * Math.sin(angle);
                branches.push({ x1: x, y1: y, x2: endX, y2: endY, w: bWidth });
                if (depth <= 5) {
                    let c = depth === 0 ? 10 : 4;
                    for(let i=0; i<c; i++){
                        let t = Math.random();
                        leafPoints.push({
                            x: x + (endX - x) * t + (Math.random()-0.5)*80,
                            y: y + (endY - y) * t + (Math.random()-0.5)*80
                        });
                    }
                }
                if (depth === 0) return;
                buildTree(endX, endY, len*(0.7+Math.random()*0.15), angle+(Math.random()-0.5)*1.1, bWidth*0.7, depth-1);
                if(Math.random() > 0.45) buildTree(endX, endY, len*(0.6+Math.random()*0.1), angle+(Math.random()-0.5)*1.2, bWidth*0.7, depth-1);
            }
            buildTree(width/2, height*0.95, Math.min(width, height)*0.25, -Math.PI/2, 14, 8);

            drawTreeToBuffer();

            ctx.font = 'italic 16px "Georgia", serif';
            let padding = width > 600 ? 120 : 40;
            let maxWidth = Math.min(width - padding * 2, 550);
            let startX = (width - maxWidth) / 2;
            let cx = startX, cy = 0;
            const lineHeight = 28;

            let layouts = [];
            poem.split('\n').forEach(para => {
                if(para === "") { cy += lineHeight * 0.7; return; }
                para.split(' ').forEach(word => {
                    let wWidth = ctx.measureText(word).width;
                    if(cx + wWidth > startX + maxWidth) { cx = startX; cy += lineHeight; }
                    for(let char of word) {
                        layouts.push({ 
                            char, 
                            x: cx + (Math.random()-0.5)*1.2,
                            y: cy + (Math.random()-0.5)*1.2, 
                            rot: (Math.random()-0.5)*0.04 
                        });
                        cx += ctx.measureText(char).width;
                    }
                    cx += ctx.measureText(" ").width;
                });
                cx = startX; cy += lineHeight * 1.5;
            });
            let offY = (height - cy) / 2;
            layouts.forEach(l => l.y += offY);

            for(let i=0; i<layouts.length; i++) {
                let lp = leafPoints[i % leafPoints.length];
                particles.push({
                    char: layouts[i].char,
                    treeX: lp.x, treeY: lp.y, treeRot: (Math.random()-0.5)*0.5,
                    textX: layouts[i].x, textY: layouts[i].y, textRot: layouts[i].rot,
                    x: lp.x, y: lp.y, vx: 0, vy: 0,
                    rot: Math.random()*Math.PI*2,
                    color: colors.leaf,
                    phase: Math.random()*Math.PI*2,
                    delay: Math.random() * 800,
                    state: 'perched'
                });
            }
        }

        function drawTreeToBuffer() {
            // 注意：由于 scale 已经应用，只需按逻辑坐标清除并重绘
            tctx.save();
            tctx.setTransform(1, 0, 0, 1, 0, 0); // 暂时重置变换以清除整个物理像素区域
            tctx.clearRect(0,0,treeCanvas.width,treeCanvas.height);
            tctx.restore();

            tctx.strokeStyle = colors.branch;
            tctx.lineCap = 'round';
            branches.forEach(b => {
                tctx.lineWidth = b.w;
                tctx.beginPath(); tctx.moveTo(b.x1, b.y1); tctx.lineTo(b.x2, b.y2); tctx.stroke();
            });
        }

        function render(time) {
            // 清除当前画布
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            
            let targetTreeAlpha = (currentMode === 'tree' && transitionStartTime === 0) ? 1.0 : 0.1;
            if (transitionStartTime !== 0) targetTreeAlpha = 0.2;
            treeOpacity += (targetTreeAlpha - treeOpacity) * 0.03;
            
            ctx.globalAlpha = treeOpacity;
            if(treeCanvas.width > 0) {
                // 绘制 buffer 时需考虑 dpr，因为我们是 1:1 绘制物理像素到物理像素
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.drawImage(treeCanvas, 0, 0);
                ctx.restore();
            }
            ctx.globalAlpha = 1.0;

            ctx.font = 'italic 16px "Georgia", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const now = performance.now();

            particles.forEach((p, idx) => {
                let targetX, targetY, targetRot;
                let isMoving = transitionStartTime !== 0;

                if (isMoving) {
                    let elapsed = now - transitionStartTime;
                    
                    if (p.state === 'perched' && elapsed > p.delay) {
                        p.state = 'flocking';
                        p.vx = (Math.random()-0.5) * 6;
                        p.vy = -3 - Math.random() * 5;
                    }

                    if (p.state === 'flocking' || p.state === 'settling') {
                        let accX = 0, accY = 0;
                        if (elapsed > 4000 + p.delay) p.state = 'settling';

                        targetX = (currentMode === 'poem') ? p.textX : p.treeX;
                        targetY = (currentMode === 'poem') ? p.textY : p.treeY;
                        targetRot = (currentMode === 'poem') ? p.textRot : p.treeRot;

                        if (p.state === 'flocking') {
                            let centerX = width * 0.5;
                            let centerY = height * 0.45;
                            accX += (centerX + Math.sin(time*0.001)*100 - p.x) * 0.0006;
                            accY += (centerY + Math.cos(time*0.001)*100 - p.y) * 0.0006;

                            for(let j=0; j<particles.length; j+=25) {
                                let other = particles[j];
                                let d = Math.hypot(p.x - other.x, p.y - other.y);
                                if(d > 0 && d < 70) {
                                    accX += (p.x - other.x) * 0.02;
                                    accY += (p.y - other.y) * 0.02;
                                    accX += other.vx * 0.02;
                                    accY += other.vy * 0.02;
                                }
                            }
                        }

                        if (p.state === 'settling') {
                            let dx = targetX - p.x;
                            let dy = targetY - p.y;
                            let d = Math.hypot(dx, dy);
                            let pull = Math.min(0.15, 100 / (d + 1));
                            accX += dx * pull * 0.025;
                            accY += dy * pull * 0.025;
                            p.vx *= 0.92; p.vy *= 0.92;
                            if (d < 1 && Math.abs(p.vx) < 0.1) {
                                p.x = targetX; p.y = targetY;
                                p.vx = 0; p.vy = 0;
                            }
                        }

                        p.vx += accX; p.vy += accY;
                        let speed = Math.hypot(p.vx, p.vy);
                        let limit = p.state === 'settling' ? 4 : 8;
                        if(speed > limit) { p.vx = (p.vx/speed)*limit; p.vy = (p.vy/speed)*limit; }

                        p.x += p.vx; p.y += p.vy;

                        if (p.state === 'settling') {
                            p.rot += (targetRot - p.rot) * 0.1;
                        } else {
                            let moveAngle = Math.atan2(p.vy, p.vx);
                            p.rot += (moveAngle - p.rot) * 0.1;
                        }
                    }
                } else {
                    if (currentMode === 'tree') {
                        let windX = Math.sin(time * 0.001 + p.phase) * 6;
                        let windY = Math.cos(time * 0.0008 + p.phase) * 4;
                        p.x += (p.treeX + windX - p.x) * 0.1;
                        p.y += (p.treeY + windY - p.y) * 0.1;
                        p.rot += (p.treeRot + Math.sin(time*0.002+p.phase)*0.1 - p.rot) * 0.05;
                    } else {
                        p.x += (p.textX - p.x) * 0.1;
                        p.y += (p.textY - p.y) * 0.1;
                        p.rot += (p.textRot - p.rot) * 0.1;
                    }
                }

                let colorT = (currentMode === 'poem') ? 
                    Math.min(1, (now - transitionStartTime - p.delay) / 5000) : 
                    Math.max(0, 1 - (now - transitionStartTime - p.delay) / 5000);
                
                if (transitionStartTime === 0) colorT = (currentMode === 'poem' ? 1 : 0);

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = lerpColor(colors.leaf, colors.text, colorT);
                ctx.fillText(p.char, 0, 0);
                ctx.restore();
            });

            requestAnimationFrame(render);
        }

        function lerpColor(a, b, t) {
            t = Math.max(0, Math.min(1, t));
            const hex = x => parseInt(x.substring(1), 16);
            const r = x => (hex(x) >> 16) & 0xff, g = x => (hex(x) >> 8) & 0xff, b_ = x => hex(x) & 0xff;
            const res = [r(a)+(r(b)-r(a))*t, g(a)+(g(b)-g(a))*t, b_(a)+(b_(b)-b_(a))*t].map(Math.round);
            return `rgb(${res[0]},${res[1]},${res[2]})`;
        }

        function toggle() {
            currentMode = (currentMode === 'tree' ? 'poem' : 'tree');
            transitionStartTime = performance.now();
            particles.forEach(p => {
                p.state = 'flocking';
            });
            document.getElementById('hint').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('hint').style.opacity = '0.7';
            }, 6000);
        }

        canvas.addEventListener('click', toggle);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            toggle();
        }, {passive: false});

        window.addEventListener('resize', resize);
        // 初始化 resize
        resize();
        requestAnimationFrame(render);
    </script>
</body>
</html>
